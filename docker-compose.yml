version: '3.9'

services:
  backend:
    build:
      context: ./apps/backend
      target: development
    ports:
      - '3000:3000'
    environment:
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    volumes:
      - ./apps/backend/src:/app/src
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend-network

  frontend:
    build:
      context: ./apps/frontend
      target: development
    ports:
      - '5173:5173'   # adjust to your framework (Next.js = 3001, Vite = 5173, etc.)
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3000   # or VITE_API_URL etc.
    volumes:
      - ./apps/frontend/src:/app/src
    depends_on:
      - backend
    networks:
      - backend-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge

volumes:
  redis-data: